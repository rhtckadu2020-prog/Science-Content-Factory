name: Run Science Factory

on:
  workflow_dispatch: # ඔබට අවශ්‍ය වෙලාවක manual රන් කරන්න
  schedule:
    - cron: '0 19 * * *' # හැමදාම රෑ 12:30 ට (SL Time) ස්වයංක්‍රීයව රන් වෙන්න

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-generativeai firebase-admin

    - name: Run Science Factory Script
      env:
        GEMINI_KEY_1: ${{ secrets.GEMINI_KEY_1 }}
        FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
      run: python main.py

    - name: Upload Generated Files
      uses: actions/upload-artifact@v4
      with:
        name: science-content-output
        path: outputs/
