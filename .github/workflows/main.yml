name: Run Science Factory

on:
  workflow_dispatch:
  schedule:
    - cron: '0 19 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-genai firebase-admin

    - name: Run Science Factory Script
      env:
        GEMINI_KEY_1: ${{ secrets.GEMINI_KEY_1 }}
        FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
      run: python main.py

    # මට අමතක වූ කොටස මෙන්න! මේකෙන් තමයි හැදෙන ෆයිල් ටික Zip කරලා දෙන්නේ
    - name: Upload Generated Files
      uses: actions/upload-artifact@v4
      with:
        name: science-content-output
        path: outputs/
